apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8snousedefaultserviceaccount
spec:
  crd:
    spec:
      names:
        kind: K8sNoUseDefaultServiceAccount
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8snousedefaultserviceaccount

        violation[{"msg": msg}] {
          input.review.object.spec.serviceAccountName == "default"
          msg := sprintf(
            "Pod '%v' uses the default ServiceAccount. Specify an explicit serviceAccountName.",
            [input.review.object.metadata.name]
          )
        }

        violation[{"msg": msg}] {
          not input.review.object.spec.serviceAccountName
          msg := sprintf(
            "Pod '%v' does not specify a serviceAccountName. The default SA will be used — this is forbidden.",
            [input.review.object.metadata.name]
          )
        }