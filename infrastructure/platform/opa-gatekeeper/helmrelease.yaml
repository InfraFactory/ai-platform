apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatekeeper
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: gatekeeper
      version: "3.22.2"
      sourceRef:
        kind: HelmRepository
        name: gatekeeper
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    replicas: 1
    auditInterval: 60
    constraintViolationsLimit: 20
    logLevel: INFO
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
